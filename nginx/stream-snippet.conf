# Add this stream block to /etc/nginx/nginx.conf
# Routes port 443 by SNI, passes real client IP via PROXY Protocol
stream {
    map_hash_bucket_size 64;
    map $ssl_preread_server_name $backend_443 {
        YOUR_MAIN_DOMAIN        127.0.0.1:8443;
        YOUR_OTHER_DOMAIN       127.0.0.1:8443;
        YOUR_ANALYTICS_DOMAIN   127.0.0.1:8445;
        default                 127.0.0.1:8444;
    }
    server {
        listen 443;
        proxy_pass $backend_443;
        proxy_protocol on;
        ssl_preread on;
    }
}
